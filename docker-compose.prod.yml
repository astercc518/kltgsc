version: '3.8'

# =============================================
# TGSC 生产环境配置 (PostgreSQL + Redis)
# 适用于 1000 账号规模
#
# 使用前请复制 .env.example 为 .env 并填入真实密钥
# cp .env.example .env
# =============================================

services:
  # ========== 数据库层 ==========
  # ⚠️ pg14 → pg16 是 major 版本升级，数据卷不兼容。
  # 切换镜像前必须执行 pg_dump 备份并迁移数据到新卷（参考 backend/scripts/migrate_pg14_to_pgvector.md）
  db:
    image: pgvector/pgvector:pg16
    container_name: tgsc_postgres
    # 1000+ 账号容量参数。max_connections=500 给 ~14 进程 * 20 连接预留余量。
    command:
      - postgres
      - -c
      - max_connections=500
      - -c
      - shared_buffers=2GB
      - -c
      - effective_cache_size=6GB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=256MB
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-tgsc_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - tgsc_internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-tgsc_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tgsc_redis
    # noeviction 防止 Celery 队列里的任务被 LRU 误淘汰；缓存类数据应自带 EXPIRE。
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 4gb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - tgsc_internal
    restart: unless-stopped

  # ========== 应用层 ==========
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: tgsc_backend
    command: sh -c "alembic upgrade head && gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000"
    expose:
      - "8000"
    volumes:
      - backend_sessions:/app/sessions
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tgsc_prod}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - tgsc_internal
    restart: unless-stopped

  # Celery Worker - 处理后台任务
  # 单 worker 容器: --concurrency=8 = 8 并发任务。
  # 3 副本 = 24 总并发，足够 1000+ 账号场景下的 burst (深度检测/AI 回复)。
  # --max-tasks-per-child=200 防止 Pyrogram/Telethon 长跑泄漏内存。
  # ⚠️ container_name 与 replicas 互斥；扩容时改用 `docker-compose up -d --scale worker=3`，
  #    或拆成 worker_0/1/2 三个服务（与 listener 同模式）。
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=8 --max-tasks-per-child=200 -Q default,high_priority,low_priority
    volumes:
      - backend_sessions:/app/sessions
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tgsc_prod}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - QT_QPA_PLATFORM=offscreen
      - QT_DEBUG_PLUGINS=0
    deploy:
      replicas: 3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - tgsc_internal
    restart: unless-stopped

  # Celery Beat - 定时任务调度器
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: tgsc_beat
    command: celery -A app.worker.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tgsc_prod}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - worker
    networks:
      - tgsc_internal
    restart: unless-stopped

  # ========== Listener 分片 ==========
  # 1000+ 账号场景：单 Pyrogram 进程稳定上限 ~200 客户端。
  # 按 account.id % 5 切分到 5 个进程，每个进程 ~200 账号。
  # 需要扩容时：调大 LISTENER_SHARD_TOTAL 并相应增加 listener_N 服务定义。
  listener_0: &listener_base
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: tgsc_listener_0
    command: python3 listener.py
    volumes:
      - backend_sessions:/app/sessions
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tgsc_prod}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - LISTENER_SHARD_TOTAL=5
      - LISTENER_SHARD_INDEX=0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - tgsc_internal
    restart: unless-stopped

  listener_1:
    <<: *listener_base
    container_name: tgsc_listener_1
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tgsc_prod}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - LISTENER_SHARD_TOTAL=5
      - LISTENER_SHARD_INDEX=1

  listener_2:
    <<: *listener_base
    container_name: tgsc_listener_2
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tgsc_prod}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - LISTENER_SHARD_TOTAL=5
      - LISTENER_SHARD_INDEX=2

  listener_3:
    <<: *listener_base
    container_name: tgsc_listener_3
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tgsc_prod}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - LISTENER_SHARD_TOTAL=5
      - LISTENER_SHARD_INDEX=3

  listener_4:
    <<: *listener_base
    container_name: tgsc_listener_4
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tgsc_prod}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - LISTENER_SHARD_TOTAL=5
      - LISTENER_SHARD_INDEX=4

  # ========== 前端层 ==========
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: tgsc_frontend
    expose:
      - "3000"
    environment:
      - VITE_API_TARGET=http://backend:8000
    networks:
      - tgsc_internal
    restart: unless-stopped

  # ========== 反向代理 ==========
  nginx:
    image: nginx:alpine
    container_name: tgsc_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - tgsc_internal
    restart: unless-stopped

networks:
  tgsc_internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_sessions:
